# Продакшен: PostgreSQL + Django (Gunicorn) + статический фронт (nginx).
# API и /admin проксируются с фронта на backend (см. frontend/nginx/default.cloud.conf).
#
# Подготовка: скопировать .env.example → .env, задать секреты и домены.
# Запуск: docker compose -f docker-compose.prod.yml up -d --build
# Логи:   docker compose -f docker-compose.prod.yml logs -f

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resident}
      POSTGRES_USER: ${POSTGRES_USER:-resident}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      DJANGO_DEBUG: "false"
      DJANGO_SERVE_MEDIA: "1"
    volumes:
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/api/site/contact/\")"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PUBLISH:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  backend_media:
