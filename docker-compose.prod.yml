services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resident}
      POSTGRES_USER: ${POSTGRES_USER:-resident}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      DJANGO_DEBUG: "false"
      DJANGO_SERVE_MEDIA: "1"
    volumes:
      - backend_media:/app/media
    depends_on:
      - db
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PUBLISH:-80}:80"
    depends_on:
      - backend

volumes:
  pgdata:
  backend_media:
